name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          MAJOR="${VERSION%%.*}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve npm publish
        if: steps.release.outputs.exists == 'false'
        id: npm
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if ! npm view "$PACKAGE_NAME" name >/dev/null 2>&1; then
            echo "::error::$PACKAGE_NAME does not exist on npm yet. Bootstrap it manually first, for example by backfilling historical 0.1.0 and 0.1.1 tarballs from matching release code, then configure npm trusted publishing for release.yml before cutting this release."
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION will be published."
          fi

      - name: Verify npm package contents
        if: steps.release.outputs.exists == 'false' && steps.npm.outputs.publish == 'true'
        run: npm pack --dry-run

      - name: Generate changelog
        if: steps.release.outputs.exists == 'false'
        run: npm run changelog

      - name: Commit changelog
        if: steps.release.outputs.exists == 'false'
        id: changelog
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "chore(release): update changelog for ${{ steps.release.outputs.tag }}"
            git push origin HEAD:master
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write GitHub release notes
        if: steps.release.outputs.exists == 'false'
        run: |
          mkdir -p .tmp
          node scripts/changelog-release-notes.mjs "${{ steps.release.outputs.version }}" > .tmp/release-notes.md

      - name: Set up Docker Buildx
        if: steps.release.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.release.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        if: steps.release.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.major }}
            ghcr.io/${{ github.repository }}:latest

      - name: Publish npm package
        if: steps.release.outputs.exists == 'false' && steps.npm.outputs.publish == 'true'
        run: npm publish --access public

      - name: Create GitHub release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ steps.changelog.outputs.sha }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes-file .tmp/release-notes.md \
            --latest
